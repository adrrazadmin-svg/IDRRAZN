<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IDRRAZN - أحواش</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(to right, #111, #222);
      color: white;
      text-align: center;
    }

    header {
      background: #e63946;
      padding: 20px;
      font-size: 32px;
      font-weight: bold;
      letter-spacing: 2px;
    }

    section {
      padding: 30px;
    }

    img {
      width: 90%;
      max-width: 500px;
      border-radius: 15px;
      margin-top: 20px;
      box-shadow: 0 0 20px rgba(255,0,0,0.3);
    }

    button {
      padding: 12px 25px;
      border: none;
      background: #e63946;
      color: white;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 20px;
    }

    button:hover {
      background: #ff4d5a;
    }

    footer {
      margin-top: 30px;
      padding: 15px;
      background: #000;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <header>IDRRAZN</header>

  <section>
    <h1>🎶 فن أحواش</h1>
    <p>
      أحواش هو فن تقليدي أمازيغي كيشتهر فـ سوس، 
      كيجمع بين الرقص الجماعي، الغناء والإيقاعات بالدفوف.
    </p>

    <img src="https://upload.wikimedia.org/wikipedia/commons/7/7e/Ahwash.jpg" alt="Ahwach">

    <br>
    <button onclick="showInfo()">تعرف أكثر</button>
  </section>

  <footer>
    © 2026 IDRRAZN - جميع الحقوق محفوظة
  </footer>

  <script>
    function showInfo() {
      alert("أحواش جزء مهم من الثقافة الأمازيغية 🎵");
    }
  </script>

</body>
</html>
